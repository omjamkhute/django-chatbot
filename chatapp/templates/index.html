 <!DOCTYPE html>
<html>
<head>
  {% load static %}
  <title>Chatbot</title>
  <link rel="icon" href="{% static 'favicon.ico' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2 class="text-center">OJ_BOSS Chatbot</h2>

  <div id="chat-box" class="border p-3 mb-3" style="height:300px; overflow-y:auto;"></div>

  <div class="input-group">
    <input type="text" id="user-input" class="form-control" placeholder="Type message...">
    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
  </div>
</div>
<!-- here is important make changes for path add js before  script-->
<script src="{% static 'js/script.js' %}"></script>
</body>
</html>
